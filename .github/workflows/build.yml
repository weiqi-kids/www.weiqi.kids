# GitHub Actions Workflow: Build Validation + Deploy
# Validates build on PR and push; on push to main, deploys build/ to gh-pages.
# 2026-07-15：補上自動部署——此前 push main 不會更新線上（Pages 吃 gh-pages 分支），
# 反思/大腦的內容改動曾累積在 main 未出貨（7/10、7/11 兩筆），與其他站 deploy.yml 慣例對齊。

name: Build Validation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'i18n/**'
      - 'static/**'
      - 'docusaurus.config.js'
      - 'sidebars.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
  workflow_dispatch: # Manual trigger

permissions:
  contents: write # push main 時要推 gh-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        env:
          # Fail on any broken links
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Deploy to gh-pages
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          commit_message: 'Deploy ${{ github.sha }} [skip ci]'

      - name: Upload build artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .docusaurus/
            build/
          retention-days: 7
